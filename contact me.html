<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Me</title>
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

  <nav>
    <ul>
      <li><a href="hom.html">Home</a></li>
      <li><a href="my skills.html">My Skills</a></li>
      <li><a href="my project.html">My project</a></li>
      <li><a href="about me.html">About me</a></li>
    </ul>
  </nav>

  <main class="contact-wrapper">

    <div class="contact-left">
      <h1>Contact Me</h1>
      <p class="tagline">"Feel free to reach out for collaborations and opportunity"</p>

      <div class="info-list">
        <div class="info-item">
          <span class="icon">✉</span>
          <span>liliosee@gmail.com</span>
        </div>
        <div class="info-item">
          <span class="icon">in</span>
          <span>linkedin.com/in/liliosse1</span>
        </div>
        <div class="info-item">
          <span class="icon">⊙</span>
          <span>github.com/liliosse-liliose</span>
        </div>
      </div>
    </div>

    <div class="contact-right">
      <h2>Message Me</h2>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Full Name" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email" />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="messagesgit commit -m "Update contact me page"" rows="4" placeholder="Message"></textarea>
      </div>

      <button type="button">Send</button>
    </div>

  </main>

</body>
</html>
